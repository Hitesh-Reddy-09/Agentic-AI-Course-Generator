version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ai-course-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_course_gen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_course_gen"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
